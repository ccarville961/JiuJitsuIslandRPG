events:
  Environment:
    actions:
    - set_environment interior
    conditions:
    - not environment_is interior
    type: event

  Create Atlas:
    actions:
    - create_npc professor,1,1
    conditions:
    - not char_exists professor
    type: event

  Setup Prologue Fighters:
    actions:
    - random_monster 5
    - random_monster 50,professor
    - set_variable jji_prologue:fighters_ready
    conditions:
    - is char_exists professor
    - not variable_set jji_prologue:fighters_ready
    type: event

  Atlas Intro:
    actions:
    - lock_controls
    - translated_dialog jji_opening_atlas_intro_1
    - translated_dialog jji_opening_atlas_intro_2
    - unlock_controls
    - set_variable jji_prologue:intro_done
    conditions:
    - is current_state WorldState
    - is variable_set jji_prologue:fighters_ready
    - not variable_set jji_prologue:intro_done
    type: event

  Start Atlas Battle:
    actions:
    - set_variable jji_prologue:battle_started
    - start_battle player,professor
    conditions:
    - is current_state WorldState
    - is variable_set jji_prologue:intro_done
    - is party_size player,greater_than,0
    - is party_size professor,greater_than,0
    - not variable_set jji_prologue:battle_started
    type: event

  Atlas Prologue Lost:
    actions:
    - translated_dialog jji_opening_atlas_win
    - set_variable jji_prologue:complete
    - transition_teleport player,healing_center.tmx,6,7,1
    conditions:
    - is current_state WorldState
    - is battle_outcome player,lost,professor
    - not variable_set jji_prologue:complete
    type: event

  Atlas Prologue Win Safety:
    actions:
    - set_variable jji_prologue:complete
    - transition_teleport player,healing_center.tmx,6,7,1
    conditions:
    - is current_state WorldState
    - is battle_outcome player,won,professor
    - not variable_set jji_prologue:complete
    type: event
