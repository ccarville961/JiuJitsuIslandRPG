events:
  Event 6:
    actions:
    - lock_controls
    - set_layer 0:0:0:255
    - play_sound japanese_temple_bell_small
    - translated_dialog eclipse_event6_1,,top
    - translated_dialog eclipse_event6_2,,top
    - play_sound japanese_temple_bell_small
    - set_layer
    - set_variable eclipse_event6:yes
    - unlock_controls
    conditions:
    - not variable_set eclipse_event6:yes
    type: event
  Event Waking Up - Nurse Jada:
    actions:
    - lock_controls
    - create_npc eclipse_cathedral_jada,6,8
    - char_face eclipse_cathedral_jada,up
    - set_layer
    - wait 1
    - translated_dialog eclipse_cathedral_jada1,,top
    - translated_dialog eclipse_cathedral_jada2,,top
    - translated_dialog eclipse_cathedral_jada3,,top
    - wait 1
    - pathfind eclipse_cathedral_jada,6,9
    - remove_npc eclipse_cathedral_jada
    - wait 3
    - set_variable eclipse_waking_up:yes
    - unlock_controls
    conditions:
    - not variable_set eclipse_waking_up:yes
    - is variable_set eclipse_bank_zircon:yes
    type: event
  Event Internal Echoes and The Voice of Revelation:
    actions:
    - lock_controls
    - set_layer 0:0:0:255
    - play_sound japanese_temple_bell_small
    - translated_dialog eclipse_event10_1
    - translated_dialog eclipse_event10_2,,top
    - translated_dialog eclipse_event10_3,,top
    - translated_dialog eclipse_event10_4,,top
    - translated_dialog eclipse_event10_5
    - play_sound japanese_temple_bell_small
    - set_layer
    - set_variable eclipse_event10:yes
    - unlock_controls
    conditions:
    - is variable_set eclipse_waking_up:yes
    - not variable_set eclipse_event10:yes
    type: event
  Create Nurse:
    actions:
    - create_npc eclipse_cathedral_nurse,5,4
    - set_teleport_faint player,eclipse_crystal_center.tmx,6,7
    - load_yaml spyder_cathedral
    conditions:
    - not char_exists eclipse_cathedral_nurse
    type: event
  Go Outside:
    actions:
    - transition_teleport player,eclipse_crystal_town.tmx,34,5,0.3
    - char_face player,down
    conditions:
    - is char_at player
    - is char_facing player,down
    type: event
    x: 6
    y: 10
  Route Music:
    actions:
    - play_music music_cathedral_theme
    conditions:
    - not music_playing music_cathedral_theme
    type: event
  Create Enforcer:
    actions:
    - create_npc eclipse_cathedral_enforcer,7,10
    - char_face eclipse_cathedral_enforcer,up
    conditions:
    - not char_exists eclipse_cathedral_enforcer
    - is variable_set eclipse_bank_zircon:yes
    type: event
  Talk Enforcer:
    actions:
    - translated_dialog eclipse_cathedral_enforcer1
    behav:
    - talk eclipse_cathedral_enforcer
    type: event
