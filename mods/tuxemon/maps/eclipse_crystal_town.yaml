events:
  Event 5:
    actions:
    - char_stop player
    - lock_controls
    - set_layer 0:0:0:255
    - play_sound japanese_temple_bell_small
    - translated_dialog eclipse_event5_1
    - translated_dialog eclipse_event5_2,,top
    - play_sound japanese_temple_bell_small
    - set_layer
    - set_variable eclipse_event5:yes
    - unlock_controls
    conditions:
    - not variable_set eclipse_event5:yes
    type: event
  Create Barmaid:
    actions:
    - create_npc eclipse_crystal_barmaid,26,13
    - char_face eclipse_crystal_barmaid,left
