events:
  JJI Kimura Intro:
    type: event
    actions:
      - lock_controls
      - translated_dialog jji_kimura_intro_1
      - translated_dialog jji_kimura_intro_2
      - translated_dialog jji_kimura_intro_3
      - translated_dialog jji_kimura_intro_4
      - translated_dialog jji_kimura_intro_5
      - translated_dialog jji_kimura_intro_6
      - set_variable jji_kimura:intro_complete
      - unlock_controls
      - transition_teleport player,player_house_bedroom.tmx,4,4,1,0:0:0
    conditions:
      - is variable_set jji_kimura:intro_ready
      - not variable_set jji_kimura:intro_complete
