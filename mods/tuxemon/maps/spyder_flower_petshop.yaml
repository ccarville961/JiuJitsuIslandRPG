  Teleport Outside:
    actions:
    - transition_teleport player,spyder_flower_city.tmx,7,25,0.3
    conditions:
    - is char_at player
    - is char_facing player,left
    type: event
    x: 0
    y: 6
  Teleport to Flower City:
    actions:
    - transition_teleport player,spyder_flower_city.tmx,10,28,0.3
    - set_variable check_vivipere_morph:no
    conditions:
    - is char_at player
    - is char_facing player,down
    height: 1
    type: event
    width: 2
    x: 9
    y: 8
