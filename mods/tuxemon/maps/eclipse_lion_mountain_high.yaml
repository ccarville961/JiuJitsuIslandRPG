    - char_face eclipse_lionmountain_snarlon,right
    conditions:
    - not char_exists eclipse_lionmountain_snarlon
    - not variable_set snarlonmountain:yes
    - is time_is hour,equals,0
    type: event
  Encounters:
    actions:
    - random_encounter eclipse_lion_mountain
    - play_map_animation grass_blue,0.1,noloop,player
    conditions:
    - is char_moved player
    - is char_at player
    height: 2
    width: 6
    x: 8
    y: 36
    type: event
  Environment Day:
    actions:
    - set_environment snow
    conditions:
    - not time_is stage_of_day,equals,night
    - not environment_is snow
    x: 1
    y: 0
    type: event
  Environment Night:
    actions:
    - set_environment night_snow
    conditions:
    - is time_is stage_of_day,equals,night
    - not environment_is night_snow
    x: 2
    y: 0
    type: event
  Play Music:
    actions:
    - play_music music_adventure_begins
    conditions:
    - not music_playing music_adventure_begins
    type: event
  Post Talk Alexander:
    actions:
    - char_talk eclipse_lionmountain_alexander,post_battle_lose
    behav:
    - talk eclipse_lionmountain_alexander
    conditions:
    - is battle_outcome player,won,eclipse_lionmountain_alexander
    type: event
