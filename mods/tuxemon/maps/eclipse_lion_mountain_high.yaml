events:
  Event 14:
    actions:
    - char_stop player
    - lock_controls
    - set_layer 0:0:0:255
    - play_sound japanese_temple_bell_small
    - translated_dialog eclipse_event14_1,,top
    - translated_dialog eclipse_event14_2,,top
    - translated_dialog eclipse_event14_3,,top
    - play_sound japanese_temple_bell_small
    - set_layer
    - set_variable eclipse_event14:yes
    - unlock_controls
    conditions:
    - is variable_set eclipse_event11:yes
    - is variable_set eclipse_event12:yes
    - is variable_set eclipse_event13:yes
    - not variable_set eclipse_event14:yes
    type: event
  Create Alexander:
    actions:
    - create_npc eclipse_lionmountain_alexander,1,29
    - char_face eclipse_lionmountain_alexander,right
    conditions:
    - not char_exists eclipse_lionmountain_alexander
    type: event
  Create Arlene:
