  Talk Adam:
    actions:
    - lock_controls
    - pathfind_to_char player,eclipse_lionmountain_adam
    - char_talk eclipse_lionmountain_adam,pre_battle
    - unlock_controls
    - add_monster tikoal,50,eclipse_lionmountain_adam,5,10
    - add_monster tikorch,55,eclipse_lionmountain_adam,5,10
    - add_monster loliferno,55,eclipse_lionmountain_adam,5,10
    - start_battle player,eclipse_lionmountain_adam
    - char_talk eclipse_lionmountain_adam,post_battle_lose
    conditions:
    - not battle_outcome player,won,eclipse_lionmountain_adam
    - is char_at player
    - not char_defeated player
    x: 2
    y: 22
    type: event
