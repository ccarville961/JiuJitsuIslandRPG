events:
  Event 13:
    actions:
    - char_stop player
    - lock_controls
    - set_layer 0:0:0:255
    - play_sound japanese_temple_bell_small
    - translated_dialog eclipse_event13_1,,top
    - translated_dialog eclipse_event13_2,,top
    - translated_dialog eclipse_event13_3,,top
    - play_sound japanese_temple_bell_small
    - set_layer
    - set_variable eclipse_event13:yes
    - unlock_controls
    conditions:
    - is variable_set eclipse_event11:yes
    - is variable_set eclipse_event12:yes
    - not variable_set eclipse_event13:yes
    type: event
  Create Adam:
    actions:
    - create_npc eclipse_lionmountain_adam,2,17
    conditions:
    - not char_exists eclipse_lionmountain_adam
    type: event
  Create Chhurim:
    actions:
    - create_npc eclipse_lionmountain_chhurim,33,16
    conditions:
    - not char_exists eclipse_lionmountain_chhurim
    type: event
  Create Enforcer:
    actions:
    - create_npc eclipse_lionmountain_enforcer,36,13
    conditions:
    - not char_exists eclipse_lionmountain_enforcer
    type: event
  Create Jacques:
    actions:
    - create_npc eclipse_lionmountain_jacques,3,27
    conditions:
    - not char_exists eclipse_lionmountain_jacques
    type: event
  Create Scientist:
    actions:
    - create_npc eclipse_lionmountain_scientist,12,31
    - char_face eclipse_lionmountain_scientist,left
    conditions:
    - not char_exists eclipse_lionmountain_scientist
    type: event
  Create Tom:
    actions:
    - create_npc eclipse_lionmountain_tom,31,33
    - char_face eclipse_lionmountain_tom,up
    conditions:
    - not char_exists eclipse_lionmountain_tom
    type: event
  Encounters:
    actions:
    - random_encounter eclipse_lion_mountain
    - play_map_animation grass_blue,0.1,noloop,player
    conditions:
    - is char_moved player
    - is char_at player
    height: 2
    width: 10
    x: 8
    y: 2
    type: event
  Environment Day:
    actions:
    - set_environment snow
    conditions:
    - not time_is stage_of_day,equals,night
    - not environment_is snow
    x: 0
    y: 1
    type: event
  Environment Night:
    actions:
    - set_environment night_snow
    conditions:
    - is time_is stage_of_day,equals,night
    - not environment_is night_snow
    x: 0
    y: 2
    type: event
  Play Music:
    actions:
    - play_music music_adventure_begins
    conditions:
    - not music_playing music_adventure_begins
    type: event
  Post Talk Adam:
    actions:
    - char_talk eclipse_lionmountain_adam,post_battle_lose
    behav:
    - talk eclipse_lionmountain_adam
    conditions:
    - is battle_outcome player,won,eclipse_lionmountain_adam
    type: event
  Post Talk Chhurim:
    actions:
    - char_talk eclipse_lionmountain_chhurim,post_battle_lose
