events:
  Create Guardian:
    actions:
    - create_npc eclipse_park_guardian,2,4
    - char_face eclipse_park_guardian,right
    conditions:
    - not char_exists eclipse_park_guardian
    type: event
  Go outside:
    actions:
    - transition_teleport player,eclipse_park_south.tmx,6,35,0.3
    - char_face player,down
    conditions:
    - is char_at player
    - is char_facing player,down
    type: event
    x: 6
    y: 5
  Route:
    actions:
    - play_music music_chibi_ninja
    conditions:
    - not music_playing music_chibi_ninja
    type: event
  Talk Guardian:
    actions:
    - translated_dialog eclipse_park_guardian3
    behav:
    - talk eclipse_park_guardian
    conditions:
    - is variable_set treestumps
    type: event
  Talk Guardian Question:
    actions:
    - translated_dialog eclipse_park_guardian2
    - translated_dialog_choice yes:no,treestumps
    - translated_dialog eclipse_park_guardian3
    behav:
    - talk eclipse_park_guardian
    conditions:
    - not variable_set treestumps
    type: event
  Vase:
    actions:
    - lock_controls
    - translated_dialog eclipse_park_guardian4
    - wait 0.5
    - char_face eclipse_park_guardian,up
    - wait 0.5
    - pathfind eclipse_park_guardian,2,3
    - wait 0.5
    - char_face eclipse_park_guardian,player
    - wait 0.5
    - translated_dialog eclipse_park_guardian5
    - wait 0.5
    - pathfind eclipse_park_guardian,2,4
    - wait 0.5
    - char_face eclipse_park_guardian,right
    - unlock_controls
    conditions:
    - is char_facing_tile player
    - is button_pressed INTERACT
    type: event
    x: 1
    y: 2
