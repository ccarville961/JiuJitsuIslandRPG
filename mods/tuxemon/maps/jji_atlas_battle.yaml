events:
  Environment:
    actions:
    - set_environment interior
    conditions:
    - not environment_is interior
    type: event

  Create Atlas:
    actions:
    - create_npc professor,1,1
    conditions:
    - not char_exists professor
    - not variable_set jji_atlas:complete
    type: event

  Setup Prologue Fighters:
    actions:
    - jji_clear_party player
    - jji_clear_party professor
    - add_monster you,5
    - add_monster coach_atlas,50,professor,5,10
    - set_variable jji_atlas:fighters_ready
    conditions:
    - is char_exists professor
    - not variable_set jji_atlas:fighters_ready
    - not variable_set jji_atlas:complete
    type: event

  Start Battle:
    actions:
    - set_variable jji_atlas:battle_started
    - start_battle player,professor
    conditions:
    - is char_exists professor
    - is variable_set jji_atlas:fighters_ready
    - is party_size player,equals,1
    - is party_size professor,equals,1
    - not variable_set jji_atlas:battle_started
    - not variable_set jji_atlas:complete
    type: event

  Prologue Lost:
    actions:
    - set_variable jji_atlas:complete
    - transition_teleport player,player_house_bedroom.tmx,4,4,1,0:0:0
    conditions:
    - is current_state WorldState
    - is battle_outcome player,lost,professor
    - not variable_set jji_atlas:complete
    type: event

  Prologue Win Safety:
    actions:
    - set_variable jji_atlas:complete
    - transition_teleport player,player_house_bedroom.tmx,4,4,1,0:0:0
    conditions:
    - is current_state WorldState
    - is battle_outcome player,won,professor
    - not variable_set jji_atlas:complete
    type: event

  Prologue Draw Safety:
    actions:
    - set_variable jji_atlas:complete
    - transition_teleport player,player_house_bedroom.tmx,4,4,1,0:0:0
    conditions:
    - is current_state WorldState
    - is battle_outcome player,draw,professor
    - not variable_set jji_atlas:complete
    type: event
