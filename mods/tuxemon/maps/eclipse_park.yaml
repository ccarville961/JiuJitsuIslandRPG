  Environment Day:
    actions:
    - set_environment park
    conditions:
    - not time_is stage_of_day,equals,night
    - not environment_is park
    type: event
  Environment Night:
    actions:
    - set_environment night_park
    conditions:
    - is time_is stage_of_day,equals,night
    - not environment_is night_park
    type: event
  Interrupt (N):
    actions:
    - set_variable park_out:null
    conditions:
    - is variable_set park_out:no
    type: event
  Interrupt (Y):
    actions:
    - set_variable park_out:null
    - transition_teleport player,eclipse_park_entrance.tmx,5,4,0.3
    - char_face player,up
    - add_item tuxeball_park,-25
    - remove_step_tracker player,steps_park
    - park_experience stop
    conditions:
    - is variable_set park_out:yes
    type: event
  Play Music:
    actions:
    - play_music music_chibi_ninja
    conditions:
    - not music_playing music_chibi_ninja
    type: event
  Sign:
    actions:
